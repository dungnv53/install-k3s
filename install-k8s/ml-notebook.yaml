apiVersion: v1
kind: Pod
metadata:
  name: light-ml-node
  labels:
    app: ml
spec:
  containers:
  - name: jupyter
    image: jupyter/scipy-notebook:x86_64-ubuntu-22.04
    ports:
    - containerPort: 8888
    volumeMounts:
    - mountPath: /home/jovyan/work
      name: ml-data
  volumes:
  - name: ml-data
    hostPath:
      path: /data/ml
      type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
spec:
  type: NodePort
  selector:
    app: ml
  ports:
    - port: 8888
      targetPort: 8888
      nodePort: 30001
